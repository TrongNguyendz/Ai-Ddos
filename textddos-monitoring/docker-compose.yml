version: '3.8'

services:
  # Frontend - Vue.js with Vite
  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
      - VITE_WS_URL=ws://localhost:8000/ws
    volumes:
      - ./frontend-vue:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - textddos-network

  # Backend - FastAPI (placeholder)
  backend:
    image: python:3.11-slim
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on:
      - mongodb
    networks:
      - textddos-network

  # MongoDB - Database
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - textddos-network

volumes:
  mongodb_data:

networks:
  textddos-network:
    driver: bridge
